name: ブログ記事生成専用（Jekyllビルドなし）

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'ブログトピック'
        required: false
        default: 'AIマーケティング 最新トレンド'
        type: string
      use_api:
        description: 'API使用'
        required: true
        default: 'mock'
        type: choice
        options:
          - 'mock'
          - 'gemini'

  schedule:
    - cron: '0 0 * * *'  # 毎日午前9時（JST）

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: 📦 Install Node Dependencies Only
        run: |
          # メインディレクトリの依存関係
          npm install sharp axios
          
          # blog-automation の依存関係
          cd scripts/blog-automation
          npm install
          cd ../..
          
      - name: 🎯 Get Topic
        id: topic
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            echo "TOPIC=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
          else
            # スケジュールから取得または曜日ベースのデフォルト
            DAY=$(date +%u)
            case $DAY in
              1) TOPIC="AI戦略 デジタル変革" ;;
              2) TOPIC="AIツール 実践ガイド" ;;
              3) TOPIC="データ分析 効果測定" ;;
              4) TOPIC="AI最新トレンド 2025" ;;
              5) TOPIC="AI導入 成功事例" ;;
              6) TOPIC="AI基礎 入門ガイド" ;;
              7) TOPIC="AIマーケティング 統合戦略" ;;
            esac
            echo "TOPIC=$TOPIC" >> $GITHUB_OUTPUT
          fi
          
      - name: 🤖 Generate Blog Post
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd scripts/blog-automation
          
          if [ "${{ github.event.inputs.use_api }}" = "gemini" ] && [ -n "$GEMINI_API_KEY" ]; then
            echo "📝 Gemini APIで記事生成: ${{ steps.topic.outputs.TOPIC }}"
            node gemini-blog-generator.js "${{ steps.topic.outputs.TOPIC }}"
          else
            echo "📝 モックで記事生成: ${{ steps.topic.outputs.TOPIC }}"
            node mock-blog-generator.js "${{ steps.topic.outputs.TOPIC }}"
          fi
          
      - name: 🎨 Fetch Featured Image
        env:
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        continue-on-error: true
        run: |
          if [ -n "$UNSPLASH_API_KEY" ]; then
            LATEST_POST=$(ls -t _posts/*.md | head -1)
            if [ -f "$LATEST_POST" ]; then
              KEYWORDS=$(grep "^tags:" "$LATEST_POST" | sed 's/tags: *\[\(.*\)\]/\1/' | sed 's/,.*//;s/^ *//;s/ *$//')
              DATE=$(date +%Y-%m-%d)
              
              chmod +x scripts/fetch-unsplash-image.js
              node scripts/fetch-unsplash-image.js "$KEYWORDS" "assets/images/blog/${DATE}-featured.jpg"
              
              # 画像パスを記事に追加
              if [ -f "assets/images/blog/${DATE}-featured.jpg" ]; then
                sed -i "s|^image:.*|image: /assets/images/blog/${DATE}-featured.jpg|" "$LATEST_POST" || \
                sed -i "/^featured:/a image: /assets/images/blog/${DATE}-featured.jpg" "$LATEST_POST"
              fi
            fi
          else
            echo "⚠️ Unsplash APIキーなし - 画像スキップ"
          fi
          
      - name: 🔗 Add Internal Links
        continue-on-error: true
        run: |
          chmod +x scripts/add-internal-links.js
          node scripts/add-internal-links.js latest || echo "内部リンク追加スキップ"
          
      - name: 📊 Update Stats
        run: |
          # 記事数をカウント
          TOTAL_POSTS=$(ls _posts/*.md 2>/dev/null | wc -l || echo "0")
          echo "📊 総記事数: $TOTAL_POSTS"
          
          # 最新記事の情報
          LATEST=$(ls -t _posts/*.md 2>/dev/null | head -1)
          if [ -f "$LATEST" ]; then
            echo "📝 最新記事: $(basename "$LATEST")"
          fi
          
      - name: 💾 Commit and Push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          git add -A
          
          if [ -n "$(git status --porcelain)" ]; then
            TOPIC="${{ steps.topic.outputs.TOPIC }}"
            API_TYPE="${{ github.event.inputs.use_api }}"
            
            git commit -m "📝 [自動投稿] ${TOPIC}

🤖 生成方法: ${API_TYPE:-mock}
📅 日付: $(date +%Y-%m-%d)
⚡ Jekyllビルドなし版

Generated by GitHub Actions
Co-Authored-By: Blog Bot <noreply@github.com>"
            
            git push
            echo "✅ 記事を公開しました！"
          else
            echo "ℹ️ 変更なし"
          fi
          
      - name: 📢 Success Notification
        if: success()
        run: |
          echo "✅ ブログ記事の生成と公開が完了しました！"
          echo "トピック: ${{ steps.topic.outputs.TOPIC }}"
          echo "Jekyll ビルドはスキップされました（サイトは次回のビルド時に更新されます）"